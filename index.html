<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>24Shift - منصة توظيف الموظفين الرقميين</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="facebook-domain-verification" content="bq3nj8xk5xukjbqbafjx400kp5smk6" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // 1. Force unregister all Service Workers immediately
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister().then(() => {
                console.log('SW Unregistered');
            });
          }
        });
      }
      
      // 2. Comprehensive Cache Clearing
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) caches.delete(name);
        });
      }

      // 3. Asset Failure Detection & Auto-Repair (Nuclear Fix)
      window.addEventListener('error', function(e) {
        // If a script or link failed to load (likely 404 in old cache)
        if (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK') {
          console.log('Asset failed to load, triggering force reload...');
          const url = new URL(window.location.href);
          // Add a cache buster if not already present
          if (!url.searchParams.has('v')) {
            url.searchParams.set('v', Date.now());
            window.location.replace(url.toString());
          }
        }
      }, true);
      
      // 4. One-time auto-reload for people stuck in the old version
      if (!localStorage.getItem('site_refreshed_v2')) {
        localStorage.setItem('site_refreshed_v2', 'true');
        const url = new URL(window.location.href);
        url.searchParams.set('reload', '1');
        window.location.replace(url.toString());
      }
    </script>
  </body>
</html>
