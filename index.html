<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>24Shift - منصة توظيف الموظفين الرقميين</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="facebook-domain-verification" content="bq3nj8xk5xukjbqbafjx400kp5smk6" />
  </head>
  <body>
    <div id="root"></div>
    <div id="emergency-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #09090b; color: white; font-family: sans-serif; z-index: 9999; transition: opacity 0.5s ease;">
        <div style="width: 50px; height: 50px; border: 3px solid rgba(139, 92, 246, 0.3); border-top-color: #8b5cf6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p id="loader-text" style="margin-top: 20px; font-weight: bold; color: #a1a1aa;">جاري تشغيل المنظمة الذكية... | Initializing 24Shift...</p>
        <button id="reset-btn" onclick="localStorage.clear(); sessionStorage.clear(); window.location.reload();" style="display: none; margin-top: 20px; padding: 10px 20px; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Reset & Reload | إعادة ضبط</button>
    </div>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
        setTimeout(() => {
            const btn = document.getElementById('reset-btn');
            const txt = document.getElementById('loader-text');
            if (txt) txt.innerText = 'Taking longer than usual... Try a hard reset?';
            if (btn) btn.style.display = 'block';
        }, 8000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      console.log('24Shift: Initialization Started');
    </script>
  </body>
</html>
